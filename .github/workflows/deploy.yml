name: Deploy

# Автодеплой только из master. Ветка dev — локальная разработка, не деплоится.
on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/tolkay_voda' }}
            git fetch --all
            git reset --hard origin/master
            docker compose up -d --build
            # Caddyfile примонтирован одним файлом: git меняет inode, а работающий
            # контейнер держит старый. Пересоздаём caddy, чтобы перецепить новый
            # конфиг (icecast/liquidsoap не трогаем — эфир не прерывается).
            docker compose up -d --force-recreate caddy
            docker image prune -f
            echo "Деплой завершён: $(git rev-parse --short HEAD)"
