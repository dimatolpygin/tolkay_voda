# Стек сайта «Толкай Вода»: app (Fastify) + caddy (reverse-proxy, авто-HTTPS).
# Бот вынесен в профиль "bot" — основной `docker compose up` поднимает сайт,
# не падая из-за отсутствующего BOT_TOKEN. Бот: `docker compose --profile bot up -d`.
#
# Локально (HTTP): SITE_DOMAIN не задан → Caddy слушает :80 → http://localhost
# Прод (HTTPS):    SITE_DOMAIN=tolkay-voda.ru, SSL_EMAIL=... → авто-Let's Encrypt

services:
  app:
    build: .
    image: tolkay-voda-app
    container_name: tolkay-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DB_PATH: /app/data/app.db
      ICECAST_HOST: icecast
    volumes:
      - app-data:/app/data
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: tolkay-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      # ":80" по умолчанию = локальный HTTP без TLS. В проде: SITE_DOMAIN=tolkay-voda.ru
      SITE_DOMAIN: ${SITE_DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # Единый эфир: Icecast раздаёт один поток всем слушателям.
  icecast:
    build: ./docker/icecast
    image: tolkay-voda-icecast
    container_name: tolkay-icecast
    restart: unless-stopped
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:?задайте ICECAST_SOURCE_PASSWORD в .env}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD:?задайте ICECAST_ADMIN_PASSWORD в .env}
    expose:
      - "8000"

  # Источник эфира: тянет треки с CDN → один 128k MP3-поток в Icecast.
  liquidsoap:
    image: savonet/liquidsoap:v2.2.5
    container_name: tolkay-liquidsoap
    restart: unless-stopped
    depends_on:
      - icecast
    environment:
      ICECAST_HOST: icecast
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:?задайте ICECAST_SOURCE_PASSWORD в .env}
    volumes:
      - ./docker/liquidsoap:/etc/liquidsoap:ro
    command: ["liquidsoap", "/etc/liquidsoap/radio.liq"]

  bot:
    build: .
    image: tolkay-voda-app
    container_name: tolkay-bot
    restart: unless-stopped
    profiles: ["bot"]
    env_file: .env
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/app.db
    volumes:
      - app-data:/app/data
    depends_on:
      - app
    command: ["node", "src/bot/index.js"]
    # Бот — long-polling процесс без HTTP-порта, healthcheck из Dockerfile
    # (fetch на :3000) к нему неприменим. Отключаем, чтобы не висел unhealthy.
    healthcheck:
      disable: true

volumes:
  app-data:
  caddy_data:
  caddy_config:
